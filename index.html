<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Расписание КубГАУ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --button-color: var(--tg-theme-button-color, #3390ec);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            
            --lecture-border: #3b82f6;
            --lecture-bg: rgba(59, 130, 246, 0.08);
            --seminar-border: #10b981;
            --seminar-bg: rgba(16, 185, 129, 0.08);
            --current-pulse: #e53e3e;
            --current-bg: rgba(229, 62, 62, 0.12);
            --card-radius: 14px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            -webkit-overflow-scrolling: touch;
        }

        /* Панель поиска (по умолчанию для ПК — сверху) */
        .header {
            padding: 14px 16px;
            background-color: var(--secondary-bg-color);
            z-index: 10;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            flex: 1;
            padding: 14px 16px;
            border-radius: var(--card-radius);
            border: 1px solid transparent;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
        }

        input:focus {
            border-color: var(--button-color);
            box-shadow: 0 0 0 2px rgba(51, 144, 236, 0.2);
        }

        button.search-btn {
            padding: 14px 20px;
            border-radius: var(--card-radius);
            border: none;
            background-color: var(--button-color);
            color: var(--button-text-color);
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s, transform 0.05s;
            touch-action: manipulation;
        }

        button.search-btn:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        .meta-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 12px;
            color: var(--hint-color);
            padding: 0 2px;
        }

        .refresh-link {
            color: var(--button-color);
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
            background: transparent;
            padding: 6px 10px;
            border-radius: 20px;
            transition: background 0.2s;
        }

        .refresh-link:active {
            background: rgba(51, 144, 236, 0.1);
        }

        /* Табы */
        .tabs {
            display: flex;
            background-color: var(--secondary-bg-color);
            border-radius: var(--card-radius);
            padding: 4px;
            margin-bottom: 20px;
            gap: 4px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px 6px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            color: var(--hint-color);
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }

        .tab.active {
            background-color: var(--bg-color);
            color: var(--text-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        /* Дни */
        .day-block {
            margin-bottom: 28px;
            opacity: 0.7;
            transition: opacity 0.2s, transform 0.2s;
            border-radius: var(--card-radius);
            padding: 4px 0;
        }

        /* Текущий день — сильное выделение */
        .day-block.today {
            opacity: 1;
            background-color: rgba(51, 144, 236, 0.12);
            padding: 8px 12px;
            margin-left: -12px;
            margin-right: -12px;
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .day-block.today .day-title {
            color: var(--button-color);
            border-bottom-color: var(--button-color);
            font-size: 1.1em;
        }

        .day-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 14px;
            padding-bottom: 6px;
            border-bottom: 1.5px solid var(--secondary-bg-color);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }

        .day-date {
            font-size: 14px;
            font-weight: 400;
            color: var(--hint-color);
        }

        /* Карточка пары */
        .pair-card {
            background-color: var(--secondary-bg-color);
            border-radius: var(--card-radius);
            padding: 14px 16px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            overflow: hidden;
            border-left: 5px solid transparent;
            transition: background 0.2s, transform 0.1s;
            word-break: break-word;
        }

        .pair-card.lecture {
            background-color: var(--lecture-bg);
            border-left-color: var(--lecture-border);
        }
        .pair-card.lecture .pair-header { color: var(--lecture-border); }

        .pair-card.seminar {
            background-color: var(--seminar-bg);
            border-left-color: var(--seminar-border);
        }
        .pair-card.seminar .pair-header { color: var(--seminar-border); }

        .pair-card.empty {
            opacity: 0.6;
            border-left-color: var(--hint-color) !important;
            background-color: transparent !important;
        }
        .pair-card.empty .pair-subject {
            font-style: italic;
            color: var(--hint-color);
        }

        /* Текущая пара — максимально контрастно */
        .pair-card.current {
            background-color: var(--current-bg);
            border: 2px solid var(--current-pulse);
            box-shadow: 0 4px 12px rgba(229, 62, 62, 0.3);
            animation: pulse-border 2s infinite;
            z-index: 2;
        }
        .pair-card.current .pair-subject {
            font-weight: 800;
            color: var(--current-pulse);
        }
        .pair-card.current::after {
            content: "ИДЕТ СЕЙЧАС";
            position: absolute;
            top: 0;
            right: 0;
            background: var(--current-pulse);
            color: white;
            font-size: 11px;
            font-weight: 800;
            padding: 4px 10px;
            border-bottom-left-radius: 10px;
            letter-spacing: 0.5px;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(229, 62, 62, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(229, 62, 62, 0); }
            100% { box-shadow: 0 0 0 0 rgba(229, 62, 62, 0); }
        }

        .pair-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 600;
            flex-wrap: wrap;
            gap: 8px;
        }

        .pair-subject {
            font-size: 17px;
            font-weight: 700;
            line-height: 1.35;
        }

        .pair-details {
            font-size: 13px;
            color: var(--hint-color);
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 2px;
        }

        .pair-details span {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* Загрузка, ошибки */
        .loader {
            text-align: center;
            padding: 48px 20px;
            color: var(--hint-color);
            display: none;
        }
        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid var(--secondary-bg-color);
            border-top-color: var(--button-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            color: var(--current-pulse);
            text-align: center;
            padding: 20px;
            display: none;
            background: rgba(229, 62, 62, 0.08);
            border-radius: var(--card-radius);
            margin: 20px;
            font-weight: 500;
        }
        .empty-state {
            text-align: center;
            color: var(--hint-color);
            margin-top: 60px;
            padding: 0 20px;
        }
        .empty-state h3 {
            margin-bottom: 8px;
            color: var(--text-color);
            font-weight: 600;
        }

        /* Мобильная версия: панель поиска СНИЗУ */
        @media (max-width: 768px) {
            body {
                position: relative;
                padding-bottom: 0;
            }
            .header {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background-color: var(--secondary-bg-color);

                border-top-left-radius: 20px;
                border-top-right-radius: 20px;
                padding: 12px 16px calc(12px + var(--safe-bottom));
                z-index: 30;
                border-top: 1px solid rgba(0,0,0,0.05);
                border-bottom: none;
            }
            .content {
                padding-bottom: 110px;
                padding-left: 14px;
                padding-right: 14px;
            }
            .input-group {
                gap: 12px;
            }
            input {
                padding: 14px 16px;
                font-size: 16px;
            }
            button.search-btn {
                padding: 14px 20px;
                font-size: 16px;
                border-radius: 40px;
            }
            .meta-info {
                margin-top: 10px;
                font-size: 11px;
            }
            .refresh-link {
                padding: 8px 12px;
            }
            .pair-card {
                padding: 16px;
                margin-bottom: 14px;
                border-radius: 16px;
            }
            .pair-subject {
                font-size: 18px;
            }
            .tab {
                padding: 12px 6px;
                font-size: 15px;
                font-weight: 600;
            }
            .day-title {
                font-size: 19px;
            }
            /* Усиление текущего дня на мобильных */
            .day-block.today {
                margin-left: -8px;
                margin-right: -8px;
                padding: 8px 8px;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 10px 14px calc(10px + var(--safe-bottom));
            }
            .input-group {
                gap: 8px;
            }
            button.search-btn {
                padding: 12px 16px;
            }
            .pair-subject {
                font-size: 16px;
            }
            .pair-card {
                padding: 12px 14px;
            }
            .content {
                padding-bottom: 100px;
            }

        @media (min-width: 769px) {
            .header {
                position: relative;
                top: 0;
                bottom: auto;
                border-radius: 0;
                box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            }
            .content {
                padding-bottom: 20px;
            }
            button.search-btn:hover {
                opacity: 0.9;
                transform: scale(0.98);
            }
        }

        .content::-webkit-scrollbar {
            width: 4px;
        }
        .content::-webkit-scrollbar-track {
            background: transparent;
        }
        .content::-webkit-scrollbar-thumb {
            background: var(--hint-color);
            border-radius: 10px;
        }
    </style>
</head>
